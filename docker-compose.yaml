services:
  postgres:
    image: postgres:16-alpine
    restart: always
    container_name: outdoors_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root_password
      POSTGRES_DB: outdoor_db
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: outdoors_redis
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: outdoors_api
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:root_password@postgres:5432/outdoor_db?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://localhost:5672
      JWT_SECRET: ae89d3b9b72bc3047dce4a4fa417025681aa96ced9e6608d9588c7c50f672103
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: outdoors_frontend
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
