services:
  postgres:
    image: postgres:16-alpine
    restart: always
    container_name: outdoors_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: outdoors_redis
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: outdoors_api
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: outdoors_frontend
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
