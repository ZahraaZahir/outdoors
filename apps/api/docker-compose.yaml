services:
  postgres:
    image: postgres:16-alpine
    restart: always
    container_name: outdoors_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root_password
      POSTGRES_DB: outdoor_db
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: outdoors_redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
